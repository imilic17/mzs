<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#1A3A1A">
  <meta name="description" content="Vodič kroz Zavičajni muzej Daruvar — lista eksponata">
  <title>Vodič — Muzej za sve</title>
  <link rel="manifest" href="../manifest.json">
  <style>
    /* ─────────────────────────────────────────
       Paleta i mjere — iste varijable kao i u
       index.html radi konzistentnog izgleda.
    ───────────────────────────────────────── */
    :root {
      --zelena:      #1A3A1A;
      --zelena-mid:  #2D5C2D;
      --zlatna:      #C8A84B;
      --krem:        #F4EFE4;
      --krem-tamna:  #E5DECA;
      --tekst-sivi:  #3A3A2A;

      /* Visina gornjeg zaglavlja — koristi se u
         izračunu visine kartice (vidi .karta).  */
      --zaglavlje-h: 64px;

      /* Razmak: padding i gap između kartica.
         Isti razmak svuda — jedna promjena = sve se mijenja. */
      --razmak: 0.875rem; /* ≈ 21 px pri bazi 24 px */
    }

    /* ═══════════════════════════════════════════
       A11y FIX #1 — html font-size
       rem je relativan na <html>, ne <body>.
       Bez ove linije: 0.875rem = 14px (PADA min 20px)!
    ═══════════════════════════════════════════ */
    html { font-size: 24px; }

    /* A11y FIX #2 — Skip link (WCAG 2.4.1) */
    .skip-link {
      position: absolute;
      top: -999px;
      left: 0.5rem;
      z-index: 999;
      background: var(--zelena);
      color: var(--zlatna);
      padding: 0.75rem 1.25rem;
      border-radius: 0 0 10px 10px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }
    .skip-link:focus { top: 0; }

    /* A11y FIX #3 — Font kontrola */
    .font-kontrola {
      position: fixed;
      bottom: 1.5rem;
      right: 1rem;
      display: flex;
      gap: 0.375rem;
      z-index: 20;
    }
    .font-kontrola__gumb {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: var(--zelena);
      color: var(--zlatna);
      border: 2px solid var(--zlatna);
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .font-kontrola__gumb:disabled { opacity: 0.35; cursor: default; }
    .font-kontrola__gumb:focus-visible {
      outline: 3px solid var(--zlatna);
      outline-offset: 2px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ─────────────────────────────────────────
       Tijelo: font min 24px, overflow skriven
       jer scroll radi samo unutar <main>.
    ───────────────────────────────────────── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background-color: var(--krem);
      color: var(--zelena);
      font-size: 24px;
      line-height: 1.4;
      /* Sprječava scroll na body razini —
         jedino <main> se scrolls.           */
      height: 100dvh;
      overflow: hidden;
    }

    /* ─────────────────────────────────────────
       ZAGLAVLJE — fiksirano na vrhu ekrana.
       Tamnozelena podloga, zlatni elementi.
    ───────────────────────────────────────── */
    .zaglavlje {
      position: fixed;
      inset: 0 0 auto 0; /* top:0, right:0, left:0, height=auto */
      height: var(--zaglavlje-h);
      background-color: var(--zelena);
      color: var(--zlatna);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.875rem;
      z-index: 10;
      /* Tanki zlatni donji rub odvaja zaglavlje od kartica */
      border-bottom: 2px solid var(--zlatna);
    }

    /* Gumb "Natrag" — dovoljno velik za tapkanje */
    .gumb-natrag {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      min-width: 44px;
      border: 2px solid var(--zlatna);
      border-radius: 10px;
      color: var(--zlatna);
      background: transparent;
      text-decoration: none;
      flex-shrink: 0;
    }

    .gumb-natrag:focus-visible {
      outline: 3px solid var(--zlatna);
      outline-offset: 2px;
    }

    .zaglavlje__naziv {
      font-size: 1.125rem; /* 27px */
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    /* ─────────────────────────────────────────
       MAIN — scrollabilni kontejner za kartice.
       Počinje ispod zaglavlja, visina do dna.
    ───────────────────────────────────────── */
    .lista {
      margin-top: var(--zaglavlje-h);
      height: calc(100dvh - var(--zaglavlje-h));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;

      display: flex;
      flex-direction: column;
      padding: var(--razmak);
      gap: var(--razmak);
    }

    /* ─────────────────────────────────────────
       KARTICA eksponata.

       Visina je precizno izračunata da točno
       2 kartice stanu na ekran bez scrollanja:

         karta_vis = (100dvh
                      - zaglavlje-h      ← header
                      - razmak×2         ← padding gore i dolje
                      - razmak           ← razmak između 2 kartice
                     ) / 2

         Kraće: 50dvh - (zaglavlje-h/2) - (razmak×1.5)
         ≈ 50dvh - 64px  (pri razmak ≈ 21px)
    ───────────────────────────────────────── */
    .karta {
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      flex-shrink: 0; /* sprječava kompresiju flex djece */

      /* Matematika visine — komentirana gore */
      height: calc(50dvh - 64px);

      /* Sjenka daje osjećaj dubine i odvaja kartice od pozadine */
      box-shadow: 0 2px 12px rgba(26, 58, 26, 0.10);
    }

    /* ── Foto/placeholder dio kartice ── */
    .karta__foto {
      position: relative;
      flex: 1; /* raste i ispunjava preostali prostor iznad dna */
      overflow: hidden;
      background-color: var(--krem-tamna);
    }

    /* Placeholder je uvijek tu — kao pozadinski sloj.
       Slika (ako postoji) leži na vrhu i prekriva ga. */
    .karta__placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.625rem;
    }

    .karta__placeholder-tekst {
      font-size: 0.875rem; /* 21px — iznad minimuma 20px */
      /* A11y FIX #6: opacity:0.5 davalo efektivni kontrast ~2.8:1 (PADA AA 4.5:1).
         0.75 daje ~6.4:1 — prolazi AA uz vidljiv tekst placeholdera. */
      opacity: 0.75;
      text-align: center;
      padding: 0 1rem;
    }

    /* Fotografija leži iznad placeholdera */
    .karta__slika {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* onerror JS klasa ovu sliku sakriva */
    }

    .karta__slika--greska {
      display: none;
    }

    /* Kategorija bedž — mali natpis u uglu slike */
    .karta__badge {
      position: absolute;
      top: 0.625rem;
      left: 0.625rem;
      background: rgba(26, 58, 26, 0.88);
      color: var(--zlatna);
      font-size: 0.875rem; /* 21px */
      font-weight: 600;
      padding: 0.25rem 0.625rem;
      border-radius: 8px;
      letter-spacing: 0.02em;
      /* Backdrop blur za čitljivost preko fotografije */
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    /* ── Donji dio kartice: naziv + gumb ── */
    .karta__dno {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.875rem 1rem;
      background: white;
      border-top: 2px solid var(--krem-tamna);
      /* Fiksna visina dna — foto area dobiva ostatak */
      flex-shrink: 0;
    }

    .karta__naziv {
      font-size: 1rem; /* 24px — točno zahtjev */
      font-weight: 700;
      color: var(--zelena);
      line-height: 1.2;
      flex: 1;
      /* Dugački nazivi se prelome, ne izlaze iz kartice */
      overflow-wrap: break-word;
    }

    /* Gumb "Otvori" — iste veličine kao i ostali gumbi */
    .gumb-otvori {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      background-color: var(--zelena);
      color: var(--zlatna);
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.875rem; /* 21px */
      font-weight: 700;
      padding: 0.75rem 1rem;
      min-height: 44px; /* WCAG minimun */
      min-width: 44px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .gumb-otvori:focus-visible {
      outline: 3px solid var(--zlatna);
      outline-offset: 2px;
    }

    /* ─────────────────────────────────────────
       STANJA: učitavanje / greška / prazno
    ───────────────────────────────────────── */
    .stanje {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1rem;
      padding: 3rem 2rem;
      color: var(--tekst-sivi);
      height: calc(100dvh - var(--zaglavlje-h) - 4rem);
    }

    .stanje__ikona {
      opacity: 0.35;
    }

    .stanje__naslov {
      font-size: 1.25rem; /* 30px */
      font-weight: 700;
      color: var(--zelena);
    }

    .stanje__opis {
      font-size: 0.875rem; /* 21px */
      max-width: 280px;
    }

    .stanje__gumb {
      margin-top: 0.5rem;
      background-color: var(--zelena);
      color: var(--zlatna);
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 700;
      padding: 0.875rem 1.5rem;
      min-height: 48px;
      cursor: pointer;
    }

    .stanje__gumb:focus-visible {
      outline: 3px solid var(--zlatna);
      outline-offset: 2px;
    }

  </style>
</head>
<body>

  <!-- A11y FIX #2 — Skip link -->
  <a class="skip-link" href="#lista">Preskoči na listu eksponata</a>

  <!-- ══════════════════════════════════════
       ZAGLAVLJE — fiksirano, uvijek vidljivo
  ══════════════════════════════════════ -->
  <header class="zaglavlje">
    <a href="../index.html"
       class="gumb-natrag"
       aria-label="Natrag na početni ekran">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M13 4 L7 10 L13 16"
              stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <h1 class="zaglavlje__naziv">Vodič kroz muzej</h1>
  </header>


  <!-- ══════════════════════════════════════
       LISTA — JS ovdje ubacuje kartice.
       aria-live: čitač ekrana najavljuje
       promjene (učitavanje → kartice).
  ══════════════════════════════════════ -->
  <main class="lista" id="lista" aria-label="Lista eksponata" aria-live="polite">

    <!-- Inicijalno stanje: prikazuje se dok fetch ne završi -->
    <div class="stanje" id="stanje-ucitavanje">
      <svg class="stanje__ikona" width="64" height="64" viewBox="0 0 64 64"
           fill="none" aria-hidden="true">
        <!-- Stiliziran muzejski luk — referenca na Aquae Balissae -->
        <rect x="4" y="56" width="56" height="5" rx="2.5" fill="#1A3A1A"/>
        <rect x="8" y="30" width="9" height="27" rx="2" fill="#1A3A1A"/>
        <rect x="47" y="30" width="9" height="27" rx="2" fill="#1A3A1A"/>
        <path d="M8 31 C8 10 56 10 56 31"
              stroke="#1A3A1A" stroke-width="5" fill="none"/>
      </svg>
      <p class="stanje__naslov">Učitavam eksponate…</p>
    </div>

  </main>


  <!-- ══════════════════════════════════════
       JAVASCRIPT — sva logika na jednom
       mjestu, organizirana u 4 koraka.
  ══════════════════════════════════════ -->
  <!-- ══════════════════════════════════════
       KONTROLA FONTA — A11y FIX #3
  ══════════════════════════════════════ -->
  <div class="font-kontrola" role="group" aria-label="Veličina slova">
    <button class="font-kontrola__gumb"
            id="font-manji"
            aria-label="Smanji slova"
            onclick="promijeniFont(-1)">A−</button>
    <button class="font-kontrola__gumb"
            id="font-veci"
            aria-label="Povećaj slova"
            onclick="promijeniFont(+1)">A+</button>
  </div>

  <script>
    const FONT_VELICINE = [20, 24, 28, 32];
    let fontIndeks = parseInt(localStorage.getItem('muzej_font_indeks') ?? '1', 10);
    if (fontIndeks < 0 || fontIndeks >= FONT_VELICINE.length) fontIndeks = 1;
    function primijeniFontVelicinu() {
      document.documentElement.style.fontSize = FONT_VELICINE[fontIndeks] + 'px';
      document.getElementById('font-manji').disabled = (fontIndeks === 0);
      document.getElementById('font-veci').disabled  = (fontIndeks === FONT_VELICINE.length - 1);
    }
    function promijeniFont(smjer) {
      fontIndeks = Math.max(0, Math.min(FONT_VELICINE.length - 1, fontIndeks + smjer));
      localStorage.setItem('muzej_font_indeks', fontIndeks);
      primijeniFontVelicinu();
    }
    primijeniFontVelicinu();
  </script>

    /* ════════════════════════════════════════
       KORAK 1 — Dohvati JSON s podacima.
       Fetch je asinkrona funkcija (async/await):
       čeka odgovor bez blokiranja stranice.
    ════════════════════════════════════════ */
    async function ucitajEksponate() {
      const lista = document.getElementById('lista');

      try {
        // Dohvati datoteku relativno od vodic/ mape
        const odgovor = await fetch('../data/eksponati.json');

        // Ako server vrati grešku (404, 500...), baci iznimku
        if (!odgovor.ok) {
          throw new Error(`HTTP greška ${odgovor.status}`);
        }

        // Pretvori odgovor u JavaScript array objekata
        const eksponati = await odgovor.json();

        // Makni "Učitavam..." i prikaži kartice
        lista.innerHTML = '';

        if (eksponati.length === 0) {
          prikaziPrazno(lista);
          return;
        }

        // Za svaki eksponat stvori karticu i dodaj u listu
        eksponati.forEach(eksponat => {
          lista.appendChild(napraviKarticu(eksponat));
        });

      } catch (greška) {
        // Fetch nije uspio — prikaži korisničku poruku greške
        console.error('Greška pri učitavanju eksponata:', greška);
        prikaziGresku(lista, greška.message);
      }
    }


    /* ════════════════════════════════════════
       KORAK 2 — Napravi HTML karticu za
       jedan eksponat iz JSON-a.
    ════════════════════════════════════════ */
    function napraviKarticu(e) {
      // Dohvati konfiguraciju za ovu kategoriju (ili default)
      const ph = PLACEHOLDEROVI[e.kategorija] ?? PLACEHOLDEROVI['default'];
      const kategNaziv = KATEGORIJE[e.kategorija] ?? e.kategorija;
      const altTekst   = e.slika_alt ?? `Fotografija eksponata: ${e.naziv}`;

      const karta = document.createElement('article');
      karta.className = 'karta';

      // Ako postoji slika u JSON-u, prikaži je iznad placeholdera.
      // onerror: kad slika ne može učitati, skloni je (placeholder se vidi ispod).
      const slikaHtml = e.slika_originalna
        ? `<img
             class="karta__slika"
             src="../${e.slika_originalna}"
             alt="${altTekst}"
             onerror="this.classList.add('karta__slika--greska')">`
        : '';

      karta.innerHTML = `
        <div class="karta__foto">

          ${slikaHtml}

          <!-- Placeholder: uvijek prisutan, slika ga prekriva ako postoji -->
          <div class="karta__placeholder"
               style="background-color: ${ph.pozadina};"
               aria-hidden="true">
            ${ph.svg}
            <span class="karta__placeholder-tekst">Fotografija dolazi uskoro</span>
          </div>

          <!-- Kategorija bedž u gornjem lijevom uglu -->
          <span class="karta__badge">${kategNaziv}</span>
        </div>

        <div class="karta__dno">
          <h2 class="karta__naziv">${e.naziv}</h2>
          <a href="eksponat.html?id=${e.id}"
             class="gumb-otvori"
             aria-label="Otvori opis eksponata: ${e.naziv}">
            Otvori
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M4 2 L10 7 L4 12"
                    stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      `;

      return karta;
    }


    /* ════════════════════════════════════════
       KORAK 3 — Prikaz stanja greške.
       Korisnik vidi jasnu poruku, ne bijeli ekran.
    ════════════════════════════════════════ */
    function prikaziGresku(kontejner, detalji) {
      kontejner.innerHTML = `
        <div class="stanje" role="alert">
          <svg class="stanje__ikona" width="64" height="64" viewBox="0 0 64 64"
               fill="none" aria-hidden="true">
            <circle cx="32" cy="32" r="28" stroke="#1A3A1A" stroke-width="4"/>
            <line x1="32" y1="18" x2="32" y2="36"
                  stroke="#1A3A1A" stroke-width="4" stroke-linecap="round"/>
            <circle cx="32" cy="45" r="2.5" fill="#1A3A1A"/>
          </svg>
          <p class="stanje__naslov">Nije moguće učitati eksponate</p>
          <p class="stanje__opis">
            Provjeri je li datoteka eksponati.json na pravom mjestu.<br>
            <small style="opacity:0.6">${detalji}</small>
          </p>
          <button class="stanje__gumb" onclick="location.reload()">
            Pokušaj ponovo
          </button>
        </div>
      `;
    }


    /* ════════════════════════════════════════
       KORAK 3b — Prikaz stanja prazne liste.
    ════════════════════════════════════════ */
    function prikaziPrazno(kontejner) {
      kontejner.innerHTML = `
        <div class="stanje">
          <svg class="stanje__ikona" width="64" height="64" viewBox="0 0 64 64"
               fill="none" aria-hidden="true">
            <rect x="8"  y="8"  width="48" height="48" rx="6" stroke="#1A3A1A" stroke-width="4"/>
            <line x1="20" y1="24" x2="44" y2="24" stroke="#1A3A1A" stroke-width="3" stroke-linecap="round"/>
            <line x1="20" y1="34" x2="36" y2="34" stroke="#1A3A1A" stroke-width="3" stroke-linecap="round"/>
          </svg>
          <p class="stanje__naslov">Nema eksponata</p>
          <p class="stanje__opis">Dodaj eksponate u data/eksponati.json</p>
        </div>
      `;
    }


    /* ════════════════════════════════════════
       POKRETANJE — učitaj odmah kad se
       stranica otvori.
    ════════════════════════════════════════ */
    ucitajEksponate();

  </script>
