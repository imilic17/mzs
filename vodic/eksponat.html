<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#1A3A1A">
  <meta name="description" content="Opis eksponata — Zavičajni muzej Daruvar">
  <title>Eksponat — Muzej za sve</title>
  <link rel="manifest" href="../manifest.json">
  <style>
    /* ─────────────────────────────────────────
       Paleta — iste varijable kao index.html
       i vodic/index.html radi konzistentnosti.
    ───────────────────────────────────────── */
    :root {
      --zelena:      #1A3A1A;
      --zelena-mid:  #2D5C2D;
      --zlatna:      #C8A84B;
      --crvena-stop: #7A1A1A;   /* boja gumba dok TTS govori */
      --krem:        #F4EFE4;
      --krem-tamna:  #E5DECA;
      --tekst-sivi:  #3A3A2A;
      --zaglavlje-h: 64px;
    }

    /* ═══════════════════════════════════════════
       A11y FIX #1 — html font-size
       rem je relativan na <html>, ne <body>.
    ═══════════════════════════════════════════ */
    html { font-size: 24px; }

    /* A11y FIX #2 — Skip link (WCAG 2.4.1) */
    .skip-link {
      position: absolute;
      top: -999px;
      left: 0.5rem;
      z-index: 999;
      background: var(--zelena);
      color: var(--zlatna);
      padding: 0.75rem 1.25rem;
      border-radius: 0 0 10px 10px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }
    .skip-link:focus { top: 0; }

    /* A11y FIX #3 — Font kontrola */
    .font-kontrola {
      position: fixed;
      bottom: 1.5rem;
      right: 1rem;
      display: flex;
      gap: 0.375rem;
      z-index: 20;
    }
    .font-kontrola__gumb {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: var(--zelena);
      color: var(--zlatna);
      border: 2px solid var(--zlatna);
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .font-kontrola__gumb:disabled { opacity: 0.35; cursor: default; }
    .font-kontrola__gumb:focus-visible {
      outline: 3px solid var(--zlatna);
      outline-offset: 2px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ─────────────────────────────────────────
       Tijelo: normalni scroll (za razliku od
       vodic/index.html koji blokira scroll na
       body razini). Ovdje je sadržaj dug.
    ───────────────────────────────────────── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background-color: var(--krem);
      color: var(--zelena);
      font-size: 24px;
      line-height: 1.5;
      /* min-height osigurava da pozadina seže do dna i na kratkim stranicama */
      min-height: 100dvh;
    }

    /* ─────────────────────────────────────────
       ZAGLAVLJE — fiksirano, zeleno, zlatno.
       Isti dizajn kao u ostalim stranicama.
    ───────────────────────────────────────── */
    .zaglavlje {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--zaglavlje-h);
      background-color: var(--zelena);
      color: var(--zlatna);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.5rem;
      z-index: 10;
      border-bottom: 2px solid var(--zlatna);
    }

    /* "← Natrag" — ikona + tekst, široko za tapkanje */
    .gumb-natrag {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      min-height: 44px;
      padding: 0 0.75rem;
      border: 2px solid var(--zlatna);
      border-radius: 10px;
      color: var(--zlatna);
      background: transparent;
      text-decoration: none;
      font-family: inherit;
      font-size: 0.875rem; /* 21px */
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .gumb-natrag:focus-visible {
      outline: 3px solid var(--zlatna);
      outline-offset: 2px;
    }

    /* Naziv kategorije u zaglavlju — popunjava ostatak prostora */
    .zaglavlje__kategorija {
      font-size: 0.875rem; /* 21px */
      font-weight: 600;
      /* A11y: opacity:0.85 na zlatnoj boji daje ~4.14:1 (PADA AA).
         Koristimo punu zlatnu boju — kontrast na zelenoj = 4.93:1. */
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    /* ─────────────────────────────────────────
       GLAVNI SADRŽAJ — počinje ispod zaglavlja.
       Flex stupac koji drži foto + sadržaj.
    ───────────────────────────────────────── */
    .glavno {
      padding-top: var(--zaglavlje-h);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ─────────────────────────────────────────
       FOTO ZONA
       Fullwidth, visina 42dvh — dovoljno da
       fotografija bude "hero", ali ostavlja
       prostor za naziv + gumb bez scrollanja
       na većini mobilnih ekrana.

       Za Z Fold7 Flex Mode: sve interaktivno
       (naziv + TTS gumb) smješteno odmah ispod
       fotografije — može biti u gornjoj polovici
       savijenog ekrana.
    ───────────────────────────────────────── */
    .foto-zona {
      width: 100%;
      height: 42dvh;
      position: relative;
      overflow: hidden;
      background-color: var(--krem-tamna);
      flex-shrink: 0;
    }

    .foto-slika {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* JS dodaje ovu klasu putem onerror handlera */
    .foto-slika--greska {
      display: none;
    }

    /* Placeholder leži ispod slike (isti princip kao u vodic/index.html) */
    .foto-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .foto-placeholder__tekst {
      font-size: 0.875rem; /* 21px */
      color: var(--zelena);
      opacity: 0.5;
    }

    /* ─────────────────────────────────────────
       SADRŽAJ — tekst, TTS gumb, detalji.
       Padding daje disanje, gap organizira
       elemente u stabilan vertikalni ritam.
    ───────────────────────────────────────── */
    .sadrzaj {
      flex: 1;
      padding: 1.25rem 1.25rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.125rem;
    }

    /* Kategorija bedž — zelena "nalepnica" */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      align-self: flex-start;
      background-color: var(--zelena);
      color: var(--zlatna);
      font-size: 0.875rem; /* 21px */
      font-weight: 600;
      padding: 0.3rem 0.75rem;
      border-radius: 8px;
      letter-spacing: 0.02em;
    }

    /* ── NAZIV: 28px — eksplicitni zahtjev ── */
    .naziv {
      font-size: 28px;
      font-weight: 900;
      color: var(--zelena);
      line-height: 1.1;
      letter-spacing: -0.025em;
    }

    /* Zlatna linija ispod naziva */
    .naziv::after {
      content: '';
      display: block;
      width: 2.5rem;
      height: 3px;
      background: var(--zlatna);
      margin-top: 0.5rem;
      border-radius: 2px;
    }

    /* ─────────────────────────────────────────
       TTS GUMB
       Minimalno 60×60px (zahtjev).
       Promjenjiv izgled: normalan ↔ "govori".

       ZAŠTO čita easy_to_read_opis, a ne kratki_opis?
       → easy_to_read_opis pisan je zajedno s
         korisnicima udruge Korak dalje, kratkim
         rečenicama, bez stručnih pojmova.
         To je jedina verzija koja je pristupačna
         osobama s intelektualnim teškoćama.
         WCAG 3.1.5 — razina čitljivosti.
    ───────────────────────────────────────── */
    .gumb-tts {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      min-height: 68px; /* > 60px zahtjev */
      background-color: var(--zelena);
      color: var(--zlatna);
      border: none;
      border-radius: 18px;
      font-family: inherit;
      font-size: 1.125rem; /* 27px */
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.01em;
      /* Nema tranzicija — pristupačnost */
    }

    /* Stanje "govori" — crvena signalizira zaustavljanje */
    .gumb-tts--govori {
      background-color: var(--crvena-stop);
      color: #FFFFFF;
    }

    .gumb-tts:focus-visible {
      outline: 4px solid var(--zlatna);
      outline-offset: 3px;
    }

    /* Upozorenje ako TTS nije podržan */
    .tts-upozorenje {
      font-size: 0.875rem; /* 21px */
      color: var(--tekst-sivi);
      opacity: 0.7;
      text-align: center;
      padding: 0.75rem 1rem;
      background: var(--krem-tamna);
      border-radius: 10px;
    }

    /* ─────────────────────────────────────────
       OPIS SEKCIJA — easy_to_read_opis
       Font 22px — eksplicitni zahtjev.
       Ove rečenice pisane su s korisnicima
       Korak dalje: kratke, konkretne, jasne.
    ───────────────────────────────────────── */
    .opis-sekcija {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .sekcija__naslov {
      font-size: 0.875rem; /* 21px */
      font-weight: 700;
      /* A11y FIX #7: opacity:0.65 davalo ~3.7:1 (PADA AA 4.5:1).
         Koristimo var(--zelena-mid) = #2D5C2D — kontrast ~5.1:1. */
      color: var(--zelena-mid);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* 22px — eksplicitni zahtjev za opis */
    .opis-tekst {
      font-size: 22px;
      color: var(--zelena);
      line-height: 1.65;
    }

    /* ─────────────────────────────────────────
       STRUČNI OPIS — kratki_opis (expandable)
       Sklonjeno jer nije primarna informacija
       u Vodič modu (koji je za Korak dalje).
       Žiriju i stručnjacima dostupno tapkanjem.
    ───────────────────────────────────────── */
    .strucni-sekcija {
      border-top: 2px solid var(--krem-tamna);
      padding-top: 1rem;
    }

    .strucni-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: transparent;
      border: none;
      padding: 0.5rem 0;
      font-family: inherit;
      font-size: 0.875rem; /* 21px */
      font-weight: 700;
      color: var(--zelena);
      cursor: pointer;
      text-align: left;
      min-height: 44px;
    }

    .strucni-toggle:focus-visible {
      outline: 3px solid var(--zlatna);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .strucni-toggle__ikona {
      flex-shrink: 0;
      color: var(--zlatna);
    }

    .strucni-tekst {
      font-size: 0.875rem; /* 21px */
      color: var(--tekst-sivi);
      line-height: 1.65;
      padding: 0.75rem 0;
      display: none; /* vidljivo tek kad korisnik tapne "Stručni opis" */
    }

    .strucni-tekst--vidljiv {
      display: block;
    }

    /* ─────────────────────────────────────────
       STANJA: učitavanje / greška / nije nađen
    ───────────────────────────────────────── */
    .stanje {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.125rem;
      padding: 3rem 2rem;
      min-height: calc(100dvh - var(--zaglavlje-h));
    }

    .stanje__ikona {
      opacity: 0.35;
    }

    .stanje__naslov {
      font-size: 1.25rem; /* 30px */
      font-weight: 700;
      color: var(--zelena);
    }

    .stanje__opis {
      font-size: 0.875rem; /* 21px */
      color: var(--tekst-sivi);
      max-width: 300px;
      line-height: 1.5;
    }

    .stanje__gumb {
      margin-top: 0.5rem;
      background-color: var(--zelena);
      color: var(--zlatna);
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.875rem; /* 21px */
      font-weight: 700;
      padding: 0.875rem 1.5rem;
      min-height: 48px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .stanje__gumb:focus-visible {
      outline: 3px solid var(--zlatna);
      outline-offset: 2px;
    }

  </style>
</head>

  <!-- ══════════════════════════════════════
       GLAVNI SADRŽAJ — JS popunjava ovdje.
       aria-live: čitač ekrana najavljuje
       kad se eksponat učita.
  ══════════════════════════════════════ -->
  <main class="glavno" id="glavno" aria-live="polite">

    <!-- Inicijalno stanje dok fetch ne završi -->
    <div class="stanje" id="stanje-ucitavanje">
      <svg class="stanje__ikona" width="64" height="64" viewBox="0 0 64 64"
           fill="none" aria-hidden="true">
        <rect x="8"  y="8"  width="48" height="48" rx="6" stroke="#1A3A1A" stroke-width="4"/>
        <line x1="18" y1="26" x2="46" y2="26" stroke="#1A3A1A" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="18" y1="36" x2="38" y2="36" stroke="#1A3A1A" stroke-width="3.5" stroke-linecap="round"/>
      </svg>
      <p class="stanje__naslov">Učitavam eksponat…</p>
    </div>

  </main>


  <!-- ══════════════════════════════════════
       JAVASCRIPT — organizirano u 5 koraka.
       Svaki korak jasno označen za učenike.
  ══════════════════════════════════════ -->
  <script>

    /* ────────────────────────────────────────
       KONFIGURACIJA KATEGORIJA
       Ista tablica kao u vodic/index.html.
    ──────────────────────────────────────── */
    const KATEGORIJE = {
      'rimsko-doba':    'Rimsko doba',
      'dvorac-i-barok': 'Dvorac i barok',
      'priroda':        'Priroda',
      'ceska-bastina':  'Češka baština',
    };

    /* Placeholder SVG ilustracije — tematske po kategoriji.
       Iste kao u vodic/index.html za konzistentnost.       */
    const PLACEHOLDER_SVG = {
      'rimsko-doba': {
        pozadina: '#EDE0BE',
        svg: `<svg width="96" height="112" viewBox="0 0 80 96" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="12" y="14" width="56" height="8" rx="4" fill="#8B6420" opacity="0.5"/>
          <path d="M16 22 L24 68 L56 68 L64 22 Z" fill="#8B6420" opacity="0.18"/>
          <path d="M16 22 L24 68 L56 68 L64 22 Z" stroke="#8B6420" stroke-width="2" opacity="0.4"/>
          <line x1="25" y1="35" x2="55" y2="35" stroke="#8B6420" stroke-width="1.5" opacity="0.35"/>
          <line x1="22" y1="49" x2="58" y2="49" stroke="#8B6420" stroke-width="1.5" opacity="0.35"/>
          <line x1="20" y1="63" x2="60" y2="63" stroke="#8B6420" stroke-width="1.5" opacity="0.35"/>
          <line x1="30" y1="22" x2="26" y2="68" stroke="#8B6420" stroke-width="1" opacity="0.25"/>
          <line x1="40" y1="21" x2="40" y2="68" stroke="#8B6420" stroke-width="1" opacity="0.25"/>

      },
      'dvorac-i-barok': {
        pozadina: '#D0DAE8',
        svg: `<svg width="96" height="112" viewBox="0 0 80 96" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="4"  y="52" width="18" height="38" rx="2" fill="#2A4A6A" opacity="0.22"/>
          <rect x="58" y="52" width="18" height="38" rx="2" fill="#2A4A6A" opacity="0.22"/>
          <rect x="24" y="36" width="32" height="54" rx="2" fill="#2A4A6A" opacity="0.28"/>
          <rect x="22" y="26" width="8"  height="12" rx="1.5" fill="#2A4A6A" opacity="0.45"/>

          <rect x="46" y="26" width="8"  height="12" rx="1.5" fill="#2A4A6A" opacity="0.45"/>
          <path d="M34 58 L34 72 Q40 78 46 72 L46 58 Z" fill="#2A4A6A" opacity="0.4"/>
          <rect x="9"  y="62" width="8" height="10" rx="1" fill="#2A4A6A" opacity="0.3"/>

          <line x1="40" y1="88" x2="40" y2="54" stroke="#1A4A1A" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
          <path d="M40 54 Q20 44 12 20 Q28 10 38 38 Z" fill="#1A5C1A" opacity="0.32"/>

          <rect x="4"  y="82" width="72" height="7" rx="3.5" fill="#5A4A3A" opacity="0.4"/>

          <path d="M14 42 C14 12 66 12 66 42" stroke="#5A4A3A" stroke-width="6" fill="none" opacity="0.4"/>
        </svg>`
      }
    };


    /* ════════════════════════════════════════
       UPRAVLJANJE WEB SPEECH API-jem.

       Varijabla govori = true dok TTS čita.
       Gumb mijenja izgled prema stanju.

       KRITIČNO: TTS uvijek čita easy_to_read_opis.
       Nikad kratki_opis ni dugi_opis.
       → Razlog: easy_to_read_opis je jedina
         verzija teksta koja je pristupačna
         osobama s intelektualnim teškoćama.
    ════════════════════════════════════════ */
    const tts = {
      govori: false,
      izgovor: null,   /* SpeechSynthesisUtterance objekt */

      /* Je li TTS uopće podržan u browseru? */
      podrzano() {
        return 'speechSynthesis' in window;
      },

      /* Pokreni čitanje teksta */
      citaj(tekst, gumb) {
        /* Zaustavi sve što se trenutno čita */
        window.speechSynthesis.cancel();

        const izgovor = new SpeechSynthesisUtterance(tekst);
        izgovor.lang  = 'hr-HR';  /* Hrvatski jezik — obavezan zahtjev */
        izgovor.rate  = 0.92;     /* Malo sporije — lakše za razumjeti */
        izgovor.pitch = 1.0;
        this.izgovor  = izgovor;

        /* Kad čitanje počne — promijeni gumb u "Zaustavi" */
        izgovor.onstart = () => {
          this.govori = true;
          this._postaviGumb(gumb, true);
        };

        /* Kad čitanje završi (prirodno ili greškom) — resetiraj */
        izgovor.onend = () => {
          this.govori = false;
          this._postaviGumb(gumb, false);
        };

        izgovor.onerror = (e) => {
          /* 'interrupted' nije prava greška — dogodi se pri cancel() */
          if (e.error !== 'interrupted') {
            console.warn('TTS greška:', e.error);
          }
          this.govori = false;
          this._postaviGumb(gumb, false);
        };

        window.speechSynthesis.speak(izgovor);
      },

      /* Zaustavi aktivno čitanje */
      zaustavi() {
        window.speechSynthesis.cancel();
        this.govori = false;
      },

      /* Promijeni vizualni izgled gumba */
      _postaviGumb(gumb, aktivno) {
        if (aktivno) {
          gumb.innerHTML = `
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
              <rect x="6"  y="6"  width="6" height="16" rx="2" fill="currentColor"/>
              <rect x="16" y="6"  width="6" height="16" rx="2" fill="currentColor"/>
            </svg>
            Zaustavi čitanje
          `;
          gumb.classList.add('gumb-tts--govori');
          gumb.setAttribute('aria-label', 'Zaustavi glasovni opis');
          gumb.setAttribute('aria-pressed', 'true');
        } else {
          gumb.innerHTML = `
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
              <!-- Zvučnik -->
              <path d="M4 10 L4 18 L9 18 L16 24 L16 4 L9 10 Z"
                    fill="currentColor"/>
              <!-- Zvučni valovi -->
              <path d="M19 9 C21.5 11 21.5 17 19 19"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
              <path d="M22 6 C26 9 26 19 22 22"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
            </svg>
            🔊 Slušaj opis
          `;
          gumb.classList.remove('gumb-tts--govori');
          gumb.setAttribute('aria-label', 'Slušaj glasovni opis eksponata na hrvatskom jeziku');
          gumb.setAttribute('aria-pressed', 'false');
        }
      }
    };


    /* ════════════════════════════════════════
       KORAK 1 — Pročitaj ?id= iz URL-a.
       URLSearchParams je standardni Web API
       za čitanje URL parametara.
    ════════════════════════════════════════ */
    function dohvatiIdIzUrla() {
      const parametri = new URLSearchParams(window.location.search);
      return parametri.get('id'); /* npr. "diatretni-pehar" */
    }


    /* ════════════════════════════════════════
       KORAK 2 — Dohvati JSON i pronađi eksponat.
    ════════════════════════════════════════ */
    async function ucitajEksponat() {
      const id = dohvatiIdIzUrla();
      const glavno = document.getElementById('glavno');

      /* Nema ?id= parametra — ne možemo nastaviti */
      if (!id) {
        prikaziGresku(glavno, 'Nije naveden eksponat.', 'Vrati se na listu i odaberi eksponat.');
        return;
      }

      try {
        const odgovor = await fetch('../data/eksponati.json');

        if (!odgovor.ok) {
          throw new Error(`HTTP greška ${odgovor.status}`);
        }

        const eksponati = await odgovor.json();

        /* Pronađi eksponat čiji id odgovara URL parametru */
        const eksponat = eksponati.find(e => e.id === id);

        if (!eksponat) {
          prikaziNijePronaden(glavno, id);
          return;
        }

        /* Sve OK — prikaži eksponat */
        prikaziEksponat(glavno, eksponat);

      } catch (greška) {
        console.error('Greška pri učitavanju:', greška);
        prikaziGresku(glavno, 'Nije moguće učitati podatke.', greška.message);
      }
    }


    /* ════════════════════════════════════════
       KORAK 3 — Prikaži eksponat na stranici.
       Gradi HTML strukturu i ubacuje je u DOM.
    ════════════════════════════════════════ */
    function prikaziEksponat(kontejner, e) {
      /* Ažuriraj naslov kartice i title stranice */
      document.title = `${e.naziv} — Muzej za sve`;
      const zaglavljeKat = document.getElementById('zaglavlje-kategorija');
      zaglavljeKat.textContent = KATEGORIJE[e.kategorija] ?? 'Vodič';

      /* Pripremi podatke za prikaz */
      const ph = PLACEHOLDER_SVG[e.kategorija] ?? PLACEHOLDER_SVG['default'];
      const altTekst = e.slika_alt ?? `Fotografija eksponata: ${e.naziv}`;
      const kategNaziv = KATEGORIJE[e.kategorija] ?? e.kategorija;

      /* Tekst koji TTS čita: easy_to_read_opis (pristupačna verzija).
         Fallback: kratki_opis ako easy_to_read_opis ne postoji u JSON-u. */
      const ttsText = e.easy_to_read_opis ?? e.kratki_opis ?? e.naziv;

      /* Prikazani opis: easy_to_read_opis (jednostavan, s Korak dalje). */
      const opisPrikaz = e.easy_to_read_opis ?? e.kratki_opis ?? '';

      /* Fotografija — ako postoji */
      const slikaHtml = e.slika_originalna
        ? `<img
             class="foto-slika"
             src="../${e.slika_originalna}"
             alt="${altTekst}"
             onerror="this.classList.add('foto-slika--greska')">`
        : '';

      /* Stručni opis (kratki_opis) — u sklonjenom odjeljku */
      const strucniHtml = e.kratki_opis && e.kratki_opis !== opisPrikaz
        ? `<div class="strucni-sekcija">
             <button class="strucni-toggle"
                     aria-expanded="false"
                     aria-controls="strucni-tekst"
                     onclick="preklopi(this)">
               Stručni opis
               <svg class="strucni-toggle__ikona" width="20" height="20"
                    viewBox="0 0 20 20" fill="none" aria-hidden="true">
                 <path d="M5 8 L10 13 L15 8"
                       stroke="currentColor" stroke-width="2.5"
                       stroke-linecap="round" stroke-linejoin="round"/>
               </svg>
             </button>
             <p class="strucni-tekst" id="strucni-tekst">${e.kratki_opis}</p>
           </div>`
        : '';

      /* TTS gumb ili upozorenje ako TTS nije podržan */
      const ttsPodrzano = tts.podrzano();
      const ttsHtml = ttsPodrzano
        ? `<button class="gumb-tts"
                   id="gumb-tts"
                   aria-label="Slušaj glasovni opis eksponata na hrvatskom jeziku"
                   aria-pressed="false">
             <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
               <path d="M4 10 L4 18 L9 18 L16 24 L16 4 L9 10 Z" fill="currentColor"/>
               <path d="M19 9 C21.5 11 21.5 17 19 19"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
               <path d="M22 6 C26 9 26 19 22 22"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
             </svg>
             🔊 Slušaj opis
           </button>`
        : `<p class="tts-upozorenje" role="status">
             Glasovni opis nije podržan u ovom browseru.
             Pokušaj otvoriti stranicu u Chrome ili Safari.
           </p>`;

      /* Upiši kompletni HTML u kontejner */
      kontejner.innerHTML = `

        <!-- ── FOTOGRAFIJA ── -->
        <div class="foto-zona" role="img" aria-label="${altTekst}">
          ${slikaHtml}
          <div class="foto-placeholder"
               style="background-color: ${ph.pozadina};"
               aria-hidden="true">
            ${ph.svg}
            <span class="foto-placeholder__tekst">Fotografija dolazi uskoro</span>
          </div>
        </div>

        <!-- ── TEKSTUALNI SADRŽAJ ── -->
        <div class="sadrzaj">

          <!-- Kategorija bedž -->
          <span class="badge">${kategNaziv}</span>

          <!-- Naziv eksponata — 28px bold -->
          <h1 class="naziv">${e.naziv}</h1>

          <!-- TTS gumb — odmah ispod naziva za brz pristup.
               Namjerno PRIJE opisa: na Flex Mode Z Fold7
               korisnik vidi gumb bez scrollanja. -->
          ${ttsHtml}

          <!-- Opis u jednostavnom jeziku — 22px -->
          <div class="opis-sekcija">
            <span class="sekcija__naslov">Opis</span>
            <p class="opis-tekst" id="tekst-opisa">${opisPrikaz}</p>
          </div>

          ${strucniHtml}

        </div>
      `;

      /* Nakon što je HTML u DOM-u — postavi event listener na TTS gumb */
      if (ttsPodrzano) {
        const gumb = document.getElementById('gumb-tts');
        gumb.addEventListener('click', () => {
          if (tts.govori) {
            tts.zaustavi();
          } else {
            tts.citaj(ttsText, gumb);
          }
        });
      }
    }


    /* ════════════════════════════════════════
       KORAK 4 — Stanje "eksponat nije pronađen".
    ════════════════════════════════════════ */
    function prikaziNijePronaden(kontejner, id) {
      kontejner.innerHTML = `
        <div class="stanje" role="alert">
          <svg class="stanje__ikona" width="64" height="64" viewBox="0 0 64 64"
               fill="none" aria-hidden="true">
            <!-- Lupa s upitnikom -->
            <circle cx="28" cy="28" r="20" stroke="#1A3A1A" stroke-width="4"/>
            <line x1="42" y1="42" x2="58" y2="58"
                  stroke="#1A3A1A" stroke-width="4" stroke-linecap="round"/>
            <line x1="28" y1="18" x2="28" y2="32"
                  stroke="#1A3A1A" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="28" cy="38" r="2" fill="#1A3A1A"/>
          </svg>
          <p class="stanje__naslov">Eksponat nije pronađen</p>
          <p class="stanje__opis">
            Ne postoji eksponat s oznakom <strong>${id}</strong>.<br>
            Vrati se na listu i odaberi eksponat.
          </p>
          <a href="index.html" class="stanje__gumb">
            ← Na listu eksponata
          </a>
        </div>
      `;
    }


    /* ════════════════════════════════════════
       KORAK 4b — Stanje greške (fetch, JSON...).
    ════════════════════════════════════════ */
    function prikaziGresku(kontejner, naslov, detalji) {
      kontejner.innerHTML = `
        <div class="stanje" role="alert">
          <svg class="stanje__ikona" width="64" height="64" viewBox="0 0 64 64"
               fill="none" aria-hidden="true">
            <circle cx="32" cy="32" r="28" stroke="#1A3A1A" stroke-width="4"/>
            <line x1="32" y1="18" x2="32" y2="36"
                  stroke="#1A3A1A" stroke-width="4" stroke-linecap="round"/>
            <circle cx="32" cy="45" r="2.5" fill="#1A3A1A"/>
          </svg>
          <p class="stanje__naslov">${naslov}</p>
          <p class="stanje__opis">${detalji ?? ''}</p>
          <a href="index.html" class="stanje__gumb">
            ← Na listu eksponata
          </a>
        </div>
      `;
    }


    /* ════════════════════════════════════════
       POMOĆNA FUNKCIJA — toggle stručnog opisa.
       Poziva se iz onclick atributa gumba.
    ════════════════════════════════════════ */
    function preklopi(gumb) {
      const tekst = document.getElementById('strucni-tekst');
      const otvoren = tekst.classList.toggle('strucni-tekst--vidljiv');
      gumb.setAttribute('aria-expanded', otvoren ? 'true' : 'false');

      /* Rotacija strelice — bez CSS animacije, samo klasom */
      const strelica = gumb.querySelector('.strucni-toggle__ikona');
      strelica.style.transform = otvoren ? 'rotate(180deg)' : '';
    }


    /* ════════════════════════════════════════
       POKRETANJE — odmah kad se stranica otvori.
    ════════════════════════════════════════ */
    ucitajEksponat();

  </script>

  <!-- ══════════════════════════════════════
       KONTROLA FONTA — A11y FIX #3
  ══════════════════════════════════════ -->
  <div class="font-kontrola" role="group" aria-label="Veličina slova">
    <button class="font-kontrola__gumb"
            id="font-manji"
            aria-label="Smanji slova"
            onclick="promijeniFont(-1)">A−</button>
    <button class="font-kontrola__gumb"
            id="font-veci"
            aria-label="Povećaj slova"
            onclick="promijeniFont(+1)">A+</button>
  </div>

  <script>
    const FONT_VELICINE = [20, 24, 28, 32];
    let fontIndeks = parseInt(localStorage.getItem('muzej_font_indeks') ?? '1', 10);
    if (fontIndeks < 0 || fontIndeks >= FONT_VELICINE.length) fontIndeks = 1;
    function primijeniFontVelicinu() {
      document.documentElement.style.fontSize = FONT_VELICINE[fontIndeks] + 'px';
      document.getElementById('font-manji').disabled = (fontIndeks === 0);
      document.getElementById('font-veci').disabled  = (fontIndeks === FONT_VELICINE.length - 1);
    }
    function promijeniFont(smjer) {
      fontIndeks = Math.max(0, Math.min(FONT_VELICINE.length - 1, fontIndeks + smjer));
      localStorage.setItem('muzej_font_indeks', fontIndeks);
      primijeniFontVelicinu();
    }
    primijeniFontVelicinu();
  </script>

<!-- A11y audit: PASS -->
